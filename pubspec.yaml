name: penfold
description: Local-first handwriting notebook. No accounts, no cloud — everything in SQLite on-device.
publish_to: 'none'
version: 0.2.75

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  file_picker: ^8.0.3
  pdf: ^3.11.1
  pdfx: ^2.6.0
  share_plus: ^10.0.2
  archive: ^3.6.0
  google_mlkit_digital_ink_recognition: ^0.15.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  just_audio: ^0.9.42
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#2455C3"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
